apiVersion: apps/v1
kind: Deployment
metadata:
  name: wolfword
  labels:
    app: wolfword
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wolfword
  template:
    metadata:
      labels:
        app: wolfword
    spec:
      containers:
        - name: wolfword
          image: ttl.sh/wolfword-aco-20260313:2h
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DAY_TIMEOUT_SEC
              value: "300"
            - name: VOTE_TIMEOUT_SEC
              value: "60"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
